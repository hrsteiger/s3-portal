# Store the upload API key as a K8s Secret.
# Generate a strong value:  python -c "import secrets; print(secrets.token_urlsafe(32))"
#
# Reference this secret in BOTH the s3-portal Deployment (as UPLOAD_API_KEY env var)
# AND in any uploader pod that needs to POST to /upload/...
apiVersion: v1
kind: Secret
metadata:
  name: s3-portal-upload-key
  namespace: default
type: Opaque
stringData:
  api-key: "REPLACE_WITH_A_STRONG_RANDOM_VALUE"
